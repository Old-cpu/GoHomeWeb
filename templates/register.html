{% extends "base.html" %}

{% block title %}注册 - 思乡签到{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>用户注册</h2>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required minlength="3" placeholder="至少 3 个字符">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="至少 6 个字符">
            </div>
            <div class="form-group">
                <label for="hometown">家乡</label>
                <input type="text" id="hometown" name="hometown" placeholder="例如：湖南长沙">
            </div>
            <div class="form-group">
                <label for="current_city">当前城市</label>
                <input type="text" id="current_city" name="current_city" placeholder="例如：北京">
            </div>
            <div class="form-group">
                <label for="leave_home_date">离家日期</label>
                <input type="date" id="leave_home_date" name="leave_home_date" placeholder="选择离家日期">
            </div>
            <div class="form-group">
                <label for="family_role">家人称呼</label>
                <select id="family_role" name="family_role">
                    <option value="妈妈">妈妈</option>
                    <option value="爸爸">爸爸</option>
                    <option value="奶奶">奶奶</option>
                    <option value="姥姥">姥姥</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nickname">对你的称呼</label>
                <input type="text" id="nickname" name="nickname" placeholder="如：娃、闺女">
            </div>
            <div class="form-group">
                <label for="tone_style">语气风格</label>
                <select id="tone_style" name="tone_style">
                    <option value="唠叨型">唠叨型</option>
                    <option value="含蓄型">含蓄型</option>
                    <option value="直白型">直白型</option>
                    <option value="幽默型">幽默型</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        <p class="auth-footer">
            已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a>
        </p>
    </div>
</div>
{% endblock %}
