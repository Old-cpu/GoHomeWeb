[workspace]
name = "HomeSignin"
version = "0.1.0"
description = "思乡签到 - 记录离家的每一天，珍藏每一份思念"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[tasks]
dev = "python app.py"
start = "python app.py"

[dependencies]
python = "3.11.*"
flask = ">=3.0.0"
werkzeug = ">=3.0.1"
requests = ">=2.31.0"

[feature.dev.dependencies]
pytest = "*"

[environments]
default = {features = ["dev"], solve-group = "default"}
dev = {features = ["dev"], solve-group = "default"}
